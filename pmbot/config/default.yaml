# ── Bot settings ──────────────────────────────────────────────────────────────
bot:
  name: pmbot
  version: "0.1.0"
  trading_mode: paper          # paper | live  — NEVER change to live in this file
  cycle_interval_minutes: 15

# ── Platforms ─────────────────────────────────────────────────────────────────
platforms:
  polymarket:
    enabled: true
    base_url: "https://clob.polymarket.com"
  kalshi:
    enabled: true
    base_url: "https://trading-api.kalshi.com/trade-api/v2"
    demo_url: "https://demo-api.kalshi.co/trade-api/v2"

# ── Scanner filters ───────────────────────────────────────────────────────────
scanner:
  min_volume_usd: 1000
  min_liquidity_usd: 500
  max_days_to_close: 90

# ── Market filter (quality gates before prediction) ───────────────────────────
filter:
  min_market_probability: 0.05   # skip near-certain markets
  max_market_probability: 0.95
  required_categories: []        # empty = all categories
  blocked_categories:
    - "test"

# ── Prediction ────────────────────────────────────────────────────────────────
prediction:
  model: baseline               # baseline | llm (TODO)
  min_confidence: 0.4

# ── Risk ──────────────────────────────────────────────────────────────────────
risk:
  bankroll_usd: 10000.0
  max_bankroll_fraction: 0.05   # hard cap per trade (5%)
  max_open_positions: 10
  min_edge_threshold: 0.03      # 3% minimum edge
  kelly_fraction: 0.25          # quarter-Kelly

# ── Execution ─────────────────────────────────────────────────────────────────
execution:
  paper:
    fill_mode: immediate        # immediate | realistic (TODO: add slippage)

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: INFO
  file: data/logs/bot.log
  json: false                   # set true for log aggregators
